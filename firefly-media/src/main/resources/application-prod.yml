server:
  port: 9040

spring:
  config:
    import: optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension},optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}
  flyway:
    connect-retries: ${FLYWAY_CONNECT_RETRIES:30}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/firefly_iot}
    username: ${SPRING_DATASOURCE_USERNAME:firefly}
    password: ${SPRING_DATASOURCE_PASSWORD:firefly123}
    hikari:
      pool-name: ${spring.application.name}-hikari
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:localhost:8848}
        namespace: ${SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE:firefly-prod}
      config:
        server-addr: ${SPRING_CLOUD_NACOS_CONFIG_SERVER_ADDR:localhost:8848}
        namespace: ${SPRING_CLOUD_NACOS_CONFIG_NAMESPACE:firefly-prod}

zlmediakit:
  host: ${ZLMEDIAKIT_HOST:localhost}
  port: ${ZLMEDIAKIT_PORT:8080}
  secret: ${ZLMEDIAKIT_SECRET:035c73f7-bb6b-4889-a715-d9eb2d1925cc}
  ssl-port: ${ZLMEDIAKIT_SSL_PORT:8443}
  public-host: ${ZLMEDIAKIT_PUBLIC_HOST:}
  public-port: ${ZLMEDIAKIT_PUBLIC_PORT:8080}
  public-ssl-port: ${ZLMEDIAKIT_PUBLIC_SSL_PORT:8443}
  public-scheme: ${ZLMEDIAKIT_PUBLIC_SCHEME:http}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    root: INFO
    com.songhg.firefly: INFO
