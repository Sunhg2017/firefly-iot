server:
  port: 9040
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  config:
    import: optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension},optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}
  application:
    name: firefly-media
  profiles:
    active: dev

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.123.102:5432/firefly_iot
    username: firefly
    password: firefly123
    hikari:
      pool-name: ${spring.application.name}-hikari
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}

  data:
    redis:
      host: 192.168.123.102
      port: 6379
      password: ''
      database: 0

  flyway:
    connect-retries: ${FLYWAY_CONNECT_RETRIES:30}
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    table: flyway_media_history

  cloud:
    nacos:
      discovery:
        server-addr: 192.168.123.102:8848
        namespace: firefly-dev
      config:
        server-addr: 192.168.123.102:8848
        namespace: firefly-dev
        file-extension: yml

gb28181:
  sip:
    ip: 0.0.0.0
    port: 5060
    domain: "3402000000"
    id: "34020000002000000001"
    password: ""
    transport: UDP
    expires: 3600

zlmediakit:
  host: localhost
  port: 8080
  secret: 035c73f7-bb6b-4889-a715-d9eb2d1925cc
  ssl-port: 8443
  rtp-port: 10000
  hook-url: http://localhost:9040/api/v1/video/hook

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/**/*.xml
  type-handlers-package: com.songhg.firefly.iot.common.mybatis

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    enabled: ${FIREFLY_TRACING_ENABLED:false}
    sampling:
      probability: ${FIREFLY_TRACING_SAMPLING:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${FIREFLY_OTLP_TRACING_ENDPOINT:http://127.0.0.1:4318/v1/traces}


