# ============================================================
# Firefly IoT — GitLab CI/CD
# ============================================================
# 触发条件:
#   push → main, develop          → 编译 + 测试
#   push tag → v*                 → 编译 + 构建镜像 + 推送 + 部署
# ============================================================
# 所需 CI/CD 变量 (Settings → CI/CD → Variables):
#   CI_REGISTRY_USER        — 镜像仓库用户名 (GitLab 自带)
#   CI_REGISTRY_PASSWORD    — 镜像仓库密码 (GitLab 自带)
#   DEPLOY_HOST             — 生产服务器 IP
#   DEPLOY_USER             — SSH 用户名
#   DEPLOY_SSH_KEY          — SSH 私钥 (File 类型)
#   DEPLOY_PATH             — 服务器上项目路径
# ============================================================

variables:
  JAVA_VERSION: "21"
  NODE_VERSION: "20"
  MAVEN_OPTS: >-
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.showDateTime=true
  IMAGE_PREFIX: $CI_REGISTRY/$CI_PROJECT_PATH

stages:
  - build
  - docker
  - deploy

# ---- 缓存 ----
.maven-cache: &maven-cache
  cache:
    key: maven-$CI_COMMIT_REF_SLUG
    paths:
      - .m2/repository/
    policy: pull-push

.npm-cache: &npm-cache
  cache:
    key: npm-$CI_COMMIT_REF_SLUG
    paths:
      - firefly-web/node_modules/
    policy: pull-push

# ============================================================
# 阶段 1: 后端编译 + 测试
# ============================================================
backend-build:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  <<: *maven-cache
  script:
    - mvn clean verify -T 4 --batch-mode --no-transfer-progress
  artifacts:
    paths:
      - firefly-gateway/target/firefly-gateway-*.jar
      - firefly-system/target/firefly-system-*.jar
      - firefly-device/target/firefly-device-*.jar
      - firefly-rule/target/firefly-rule-*.jar
      - firefly-media/target/firefly-media-*.jar
      - firefly-data/target/firefly-data-*.jar
      - firefly-support/target/firefly-support-*.jar
      - firefly-connector/target/firefly-connector-*.jar
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop)$/
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ============================================================
# 阶段 2: 前端编译 + 检查
# ============================================================
frontend-build:
  stage: build
  image: node:${NODE_VERSION}-alpine
  <<: *npm-cache
  script:
    - cd firefly-web
    - npm ci --registry=https://registry.npmmirror.com
    - npx tsc --noEmit
    - npm run build
  artifacts:
    paths:
      - firefly-web/dist/
    expire_in: 1 day
  rules:
    - if: $CI_COMMIT_BRANCH =~ /^(main|develop)$/
    - if: $CI_COMMIT_TAG =~ /^v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# ============================================================
# 阶段 3: 构建 Docker 镜像并推送
# ============================================================
.docker-build-template: &docker-build
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^v/

# --- 微服务镜像 (并行 8 个) ---
.microservice-image: &microservice-image
  <<: *docker-build
  needs: [backend-build]
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG="$CI_COMMIT_TAG"
      else
        TAG="$CI_COMMIT_SHORT_SHA"
      fi
      IMAGE="$IMAGE_PREFIX/$MODULE:$TAG"
      IMAGE_LATEST="$IMAGE_PREFIX/$MODULE:latest"
      
      docker build \
        --build-arg MODULE=$MODULE \
        --build-arg PORT=$PORT \
        -f deploy/Dockerfile \
        -t $IMAGE \
        -t $IMAGE_LATEST \
        .
      
      docker push $IMAGE
      docker push $IMAGE_LATEST

docker-gateway:
  <<: *microservice-image
  variables:
    MODULE: firefly-gateway
    PORT: "8080"

docker-system:
  <<: *microservice-image
  variables:
    MODULE: firefly-system
    PORT: "8081"

docker-device:
  <<: *microservice-image
  variables:
    MODULE: firefly-device
    PORT: "9020"

docker-rule:
  <<: *microservice-image
  variables:
    MODULE: firefly-rule
    PORT: "9030"

docker-media:
  <<: *microservice-image
  variables:
    MODULE: firefly-media
    PORT: "9040"

docker-data:
  <<: *microservice-image
  variables:
    MODULE: firefly-data
    PORT: "9050"

docker-support:
  <<: *microservice-image
  variables:
    MODULE: firefly-support
    PORT: "9060"

docker-connector:
  <<: *microservice-image
  variables:
    MODULE: firefly-connector
    PORT: "9070"

# --- 前端镜像 ---
docker-web:
  <<: *docker-build
  needs: [frontend-build]
  script:
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        TAG="$CI_COMMIT_TAG"
      else
        TAG="$CI_COMMIT_SHORT_SHA"
      fi
      IMAGE="$IMAGE_PREFIX/firefly-web:$TAG"
      IMAGE_LATEST="$IMAGE_PREFIX/firefly-web:latest"
      
      docker build \
        -f deploy/Dockerfile.web \
        -t $IMAGE \
        -t $IMAGE_LATEST \
        .
      
      docker push $IMAGE
      docker push $IMAGE_LATEST

# ============================================================
# 阶段 4: 部署到生产服务器 (仅 tag 触发)
# ============================================================
deploy-production:
  stage: deploy
  image: alpine:3.19
  needs:
    - docker-gateway
    - docker-system
    - docker-device
    - docker-rule
    - docker-media
    - docker-data
    - docker-support
    - docker-connector
    - docker-web
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$DEPLOY_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST << EOF
        cd $DEPLOY_PATH
        
        # 拉取最新代码
        git pull origin main
        
        # 拉取最新镜像
        docker compose -f deploy/docker-compose.prod.yml pull
        
        # 滚动更新微服务
        docker compose -f deploy/docker-compose.prod.yml up -d \
          --no-build --pull always \
          gateway system device rule media data support connector web
        
        # 清理旧镜像
        docker image prune -f --filter "label=app=firefly-iot"
        
        echo "✅ Deploy completed: $CI_COMMIT_TAG"
      EOF
  environment:
    name: production
    url: http://$DEPLOY_HOST
  rules:
    - if: $CI_COMMIT_TAG =~ /^v/
      when: manual
