server:
  port: 8080

spring:
  config:
    import: optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension},optional:nacos:${spring.application.name}.${spring.cloud.nacos.config.file-extension}
  application:
    name: firefly-gateway
  profiles:
    active: dev

  cloud:
    nacos:
      discovery:
        server-addr: 192.168.123.102:8848
        namespace: firefly-dev
        group: DEFAULT_GROUP
        register-enabled: true
      config:
        server-addr: 192.168.123.102:8848
        namespace: firefly-dev
        file-extension: yml

    gateway:
      # ====================================================================
      # Internal UI/JWT traffic keeps using /{SHORTNAME}/api/v1/**.
      # External AppKey OpenAPI traffic is exposed as /open/{SHORTNAME}/api/v1/**.
      # Example:
      #   /DEVICE/api/v1/devices                               -> firefly-device /api/v1/devices
      #   /open/DEVICE/api/v1/products/thing-model/by-product-key
      #                                                      -> firefly-device /api/v1/products/thing-model/by-product-key
      # ====================================================================
      discovery:
        locator:
          enabled: false
      routes:
        - id: system-route
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/SYSTEM/api/**
          filters:
            - RewritePath=/SYSTEM/api/(?<segment>.*), /api/${segment}
        - id: open-system-route
          uri: http://127.0.0.1:8081
          predicates:
            - Path=/open/SYSTEM/api/**
          filters:
            - RewritePath=/open/SYSTEM/api/(?<segment>.*), /api/${segment}
        - id: data-route
          uri: http://127.0.0.1:9050
          predicates:
            - Path=/DATA/api/**
          filters:
            - RewritePath=/DATA/api/(?<segment>.*), /api/${segment}
        - id: open-data-route
          uri: http://127.0.0.1:9050
          predicates:
            - Path=/open/DATA/api/**
          filters:
            - RewritePath=/open/DATA/api/(?<segment>.*), /api/${segment}
        - id: media-route
          uri: http://127.0.0.1:9040
          predicates:
            - Path=/MEDIA/api/**
          filters:
            - RewritePath=/MEDIA/api/(?<segment>.*), /api/${segment}
        - id: open-media-route
          uri: http://127.0.0.1:9040
          predicates:
            - Path=/open/MEDIA/api/**
          filters:
            - RewritePath=/open/MEDIA/api/(?<segment>.*), /api/${segment}
        - id: support-route
          uri: http://127.0.0.1:9060
          predicates:
            - Path=/SUPPORT/api/**
          filters:
            - RewritePath=/SUPPORT/api/(?<segment>.*), /api/${segment}
        - id: open-support-route
          uri: http://127.0.0.1:9060
          predicates:
            - Path=/open/SUPPORT/api/**
          filters:
            - RewritePath=/open/SUPPORT/api/(?<segment>.*), /api/${segment}
        - id: rule-route
          uri: http://127.0.0.1:9030
          predicates:
            - Path=/RULE/api/**
          filters:
            - RewritePath=/RULE/api/(?<segment>.*), /api/${segment}
        - id: open-rule-route
          uri: http://127.0.0.1:9030
          predicates:
            - Path=/open/RULE/api/**
          filters:
            - RewritePath=/open/RULE/api/(?<segment>.*), /api/${segment}
        - id: device-route
          uri: http://127.0.0.1:9020
          predicates:
            - Path=/DEVICE/api/**
          filters:
            - RewritePath=/DEVICE/api/(?<segment>.*), /api/${segment}
        - id: open-device-route
          uri: http://127.0.0.1:9020
          predicates:
            - Path=/open/DEVICE/api/**
          filters:
            - RewritePath=/open/DEVICE/api/(?<segment>.*), /api/${segment}
        - id: connector-route
          uri: http://127.0.0.1:9070
          predicates:
            - Path=/CONNECTOR/api/**
          filters:
            - RewritePath=/CONNECTOR/api/(?<segment>.*), /api/${segment}
        - id: open-connector-route
          uri: http://127.0.0.1:9070
          predicates:
            - Path=/open/CONNECTOR/api/**
          filters:
            - RewritePath=/open/CONNECTOR/api/(?<segment>.*), /api/${segment}
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin

    sentinel:
      transport:
        dashboard: 192.168.123.102:8858

  data:
    redis:
      host: 192.168.123.102
      port: 6379
      password: ''
      database: 0

auth:
  jwt:
    public-key: ''  # Base64 encoded RSA public key, leave empty for dev passthrough mode

firefly:
  openapi:
    appkey:
      signature-window-seconds: 300

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  tracing:
    enabled: ${FIREFLY_TRACING_ENABLED:false}
    sampling:
      probability: ${FIREFLY_TRACING_SAMPLING:1.0}
    propagation:
      type: w3c
  otlp:
    tracing:
      endpoint: ${FIREFLY_OTLP_TRACING_ENDPOINT:http://127.0.0.1:4318/v1/traces}

logging:
  level:
    org.springframework.cloud.gateway: INFO

