# ============================================================
# Firefly IoT — GitHub Actions CI/CD
# ============================================================
# 触发条件:
#   push / PR → main, develop     → 编译 + 测试
#   push tag  → v*                → 编译 + 构建镜像 + 推送
# ============================================================

name: CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/firefly-iot

permissions:
  contents: read
  packages: write

# ============================================================
# 阶段 1: 后端编译 + 测试
# ============================================================
jobs:
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Maven Build & Test
        run: mvn clean verify -T 4 --batch-mode --no-transfer-progress

      - name: Upload JARs
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          retention-days: 1
          path: |
            firefly-gateway/target/firefly-gateway-*.jar
            firefly-system/target/firefly-system-*.jar
            firefly-device/target/firefly-device-*.jar
            firefly-rule/target/firefly-rule-*.jar
            firefly-media/target/firefly-media-*.jar
            firefly-data/target/firefly-data-*.jar
            firefly-support/target/firefly-support-*.jar
            firefly-connector/target/firefly-connector-*.jar

  # ============================================================
  # 阶段 2: 前端编译 + 检查
  # ============================================================
  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firefly-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: firefly-web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Upload Dist
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          retention-days: 1
          path: firefly-web/dist/

  # ============================================================
  # 阶段 3: 构建并推送 Docker 镜像 (仅 main 分支 / tag)
  # ============================================================
  docker-build:
    name: Build & Push Docker Images
    needs: [backend-build, frontend-build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: firefly-gateway
            port: 8080
          - module: firefly-system
            port: 8081
          - module: firefly-device
            port: 9020
          - module: firefly-rule
            port: 9030
          - module: firefly-media
            port: 9040
          - module: firefly-data
            port: 9050
          - module: firefly-support
            port: 9060
          - module: firefly-connector
            port: 9070
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Backend JARs
        uses: actions/download-artifact@v4
        with:
          name: backend-jars

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.module }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build & Push ${{ matrix.module }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODULE=${{ matrix.module }}
            PORT=${{ matrix.port }}

  # ============================================================
  # 阶段 3b: 构建前端 Docker 镜像
  # ============================================================
  docker-build-web:
    name: Build & Push Web Image
    needs: [frontend-build]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/firefly-web
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ============================================================
  # 阶段 4: 部署到服务器 (仅 tag 触发)
  # ============================================================
  deploy:
    name: Deploy to Production
    needs: [docker-build, docker-build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            
            # 拉取最新代码
            git pull origin main
            
            # 拉取最新镜像
            docker compose -f deploy/docker-compose.prod.yml pull
            
            # 滚动更新微服务
            docker compose -f deploy/docker-compose.prod.yml up -d \
              --no-build --pull always \
              gateway system device rule media data support connector web
            
            # 清理旧镜像
            docker image prune -f --filter "label=app=firefly-iot"
            
            echo "✅ Deploy completed: ${{ github.ref_name }}"
