# ============================================================
# Firefly IoT — GitHub Actions CI/CD
# ============================================================
# 触发条件:
#   push / PR → master/main/develop → 编译 + 测试
#   push tag  → v*                → 编译 + 构建镜像 + 推送 + 部署
# ============================================================

name: CI/CD

on:
  push:
    branches: [master, main, develop]
    tags: ['v*']
  pull_request:
    branches: [master, main, develop]

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      image_namespace: ${{ steps.vars.outputs.image_namespace }}
    steps:
      - name: Compute image namespace
        id: vars
        run: |
          echo "image_namespace=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  # ============================================================
  # 阶段 1: 后端编译 + 测试
  # ============================================================
  backend-build:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Maven Build & Test
        run: mvn clean verify -T 4 --batch-mode --no-transfer-progress

  # ============================================================
  # 阶段 2: 前端编译 + 检查
  # ============================================================
  frontend-build:
    name: Frontend Build & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firefly-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: firefly-web/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ============================================================
  # 阶段 3: 构建并推送 Docker 镜像 (仅 master/main 分支 / tag)
  # ============================================================
  docker-build:
    name: Build & Push Docker Images
    needs: [prepare, backend-build, frontend-build]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - module: firefly-gateway
            port: 8080
          - module: firefly-system
            port: 8081
          - module: firefly-device
            port: 9020
          - module: firefly-rule
            port: 9030
          - module: firefly-media
            port: 9040
          - module: firefly-data
            port: 9050
          - module: firefly-support
            port: 9060
          - module: firefly-connector
            port: 9070
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_namespace }}/${{ matrix.module }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build & Push ${{ matrix.module }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MODULE=${{ matrix.module }}
            PORT=${{ matrix.port }}
          cache-from: type=gha,scope=${{ matrix.module }}
          cache-to: type=gha,mode=max,scope=${{ matrix.module }}

  # ============================================================
  # 阶段 3b: 构建前端 Docker 镜像
  # ============================================================
  docker-build-web:
    name: Build & Push Web Image
    needs: [prepare, frontend-build]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.image_namespace }}/firefly-web
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build & Push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=firefly-web
          cache-to: type=gha,mode=max,scope=firefly-web

  # ============================================================
  # 阶段 4: 部署到服务器 (仅 tag 触发)
  # ============================================================
  deploy:
    name: Deploy to Production
    needs: [prepare, docker-build, docker-build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_IMAGE_REGISTRY: ${{ env.REGISTRY }}
          APP_IMAGE_NAMESPACE: ${{ needs.prepare.outputs.image_namespace }}
          APP_IMAGE_TAG: ${{ github.ref_name }}
          APP_IMAGE_REGISTRY_USERNAME: ${{ secrets.GHCR_USERNAME }}
          APP_IMAGE_REGISTRY_PASSWORD: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: APP_IMAGE_REGISTRY,APP_IMAGE_NAMESPACE,APP_IMAGE_TAG,APP_IMAGE_REGISTRY_USERNAME,APP_IMAGE_REGISTRY_PASSWORD
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git fetch origin --tags
            git checkout "${{ github.ref_name }}"
            cd deploy
            bash deploy.sh release
